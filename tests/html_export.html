    <script type="module" src="service.js"></script>
    <script>
      // Listen for branding message and attach to window
      window.addEventListener("message", function (event) {
        if (event.data && event.data.type === "branding") {
          // Attach branding to window object
          window.PRESWALD_BRANDING = event.data.branding;

          // Dispatch an event to notify app that branding is available
          window.dispatchEvent(new CustomEvent("branding-loaded"));
        }
      });
    </script>
